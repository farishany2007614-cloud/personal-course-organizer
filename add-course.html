<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إضافة كورس - منظم الكورسات الشخصي</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <h1>منظم الكورسات الشخصي</h1>
        <p>أضف كورس جديد إلى قائمتك</p>
    </header>

    <nav>
        <a href="index.html">الرئيسية</a>
        <a href="my-courses.html">كورساتي</a>
        <a href="add-course.html">إضافة كورس</a>
        <a href="contact-us.html">تواصل معنا</a>
    </nav>

    <main>
        <section>
            <h2>نموذج إضافة كورس جديد</h2>
            <form action="#" method="post">
                <div class="form-group">
                    <label for="course-name">اسم الكورس:</label>
                    <input type="text" id="course-name" name="course-name" required placeholder="أدخل اسم الكورس">
                </div>
                <div class="form-group">
                    <label for="instructor">المحاضر:</label>
                    <input type="text" id="instructor" name="instructor" required placeholder="اسم المحاضر">
                </div>
                <div class="form-group">
                    <label for="hours">الساعات المعتمدة:</label>
                    <input type="number" id="hours" name="hours" required min="1" max="10">
                </div>
                <div class="form-group">
                    <label for="notes">ملاحظات:</label>
                    <textarea id="notes" name="notes" rows="4" placeholder="أضف أي ملاحظات هنا..."></textarea>
                </div>
                <button type="submit">إضافة الكورس</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 منظم الكورسات الشخصي. جميع الحقوق محفوظة.</p>
    </footer>

</body>
</html>
