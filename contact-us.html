<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تواصل معنا - منظم الكورسات الشخصي</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <h1>منظم الكورسات الشخصي</h1>
        <p>نحن هنا لمساعدتك في أي وقت</p>
    </header>

    <nav>
        <a href="index.html">الرئيسية</a>
        <a href="my-courses.html">كورساتي</a>
        <a href="add-course.html">إضافة كورس</a>
        <a href="contact-us.html">تواصل معنا</a>
    </nav>

    <main>
        <section>
            <h2>تواصل معنا</h2>
            <p>إذا كان لديك أي استفسار، اقتراح، أو واجهت مشكلة في استخدام الموقع، لا تتردد في مراسلتنا.</p>
            
            <form action="#" method="post">
                <div class="form-group">
                    <label for="name">الاسم الكامل:</label>
                    <input type="text" id="name" name="name" required placeholder="أدخل اسمك الكامل">
                </div>
                <div class="form-group">
                    <label for="email">البريد الإلكتروني:</label>
                    <input type="email" id="email" name="email" required placeholder="example@mail.com">
                </div>
                <div class="form-group">
                    <label for="message">الرسالة:</label>
                    <textarea id="message" name="message" rows="5" required placeholder="اكتب رسالتك هنا بالتفصيل..."></textarea>
                </div>
                <button type="submit">إرسال الرسالة الآن</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 منظم الكورسات الشخصي. تم التصميم بكل حب لمساعدة الطلاب.</p>
    </footer>

</body>
</html>
